<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー管理 — 社内Webシステム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Meiryo', 'Yu Gothic', sans-serif; background: #eef2f7; min-height: 100vh; color: #333; }

    .top-bar {
      background: #2d3748; color: #fff;
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-bar .title { font-size: 16px; font-weight: bold; }
    .top-bar .subtitle { font-size: 12px; color: #a0aec0; margin-left: 12px; }
    .top-bar a { color: #90cdf4; font-size: 13px; text-decoration: none; }
    .top-bar a:hover { text-decoration: underline; }

    .content { max-width: 1000px; margin: 0 auto; padding: 32px 24px; }

    .card {
      background: #fff; border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }
    .card-header {
      padding: 16px 20px; border-bottom: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h2 { font-size: 16px; color: #2d3748; }
    .card-body { padding: 20px; }

    /* テーブル */
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f7fafc; color: #4a5568; font-weight: bold; padding: 10px 12px; text-align: left; border-bottom: 2px solid #e2e8f0; white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f7fafc; }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 12px;
      font-size: 11px; font-weight: bold;
    }
    .badge-active  { background: #c6f6d5; color: #276749; }
    .badge-inactive{ background: #e2e8f0; color: #718096; }
    .badge-locked  { background: #fed7d7; color: #c53030; }
    .badge-expired { background: #feebc8; color: #c05621; }

    /* ボタン */
    .btn {
      padding: 6px 12px; border: none; border-radius: 4px;
      font-size: 12px; font-weight: bold; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary  { background: #3182ce; color: #fff; }
    .btn-success  { background: #38a169; color: #fff; }
    .btn-warning  { background: #dd6b20; color: #fff; }
    .btn-danger   { background: #e53e3e; color: #fff; }
    .btn-gray     { background: #718096; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* フォーム */
    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; font-weight: bold; color: #4a5568; }
    .form-group input {
      padding: 8px 10px; border: 1px solid #cbd5e0; border-radius: 4px;
      font-size: 13px; font-family: monospace; width: 180px;
    }
    .form-group input:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }

    /* アラート */
    .alert {
      padding: 10px 14px; border-radius: 4px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .alert.visible { display: block; }
    .alert-success { background: #f0fff4; border: 1px solid #9ae6b4; color: #276749; }
    .alert-error   { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; }

    /* モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: center; justify-content: center;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #fff; border-radius: 8px; padding: 28px 28px 24px;
      width: 380px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    .modal h3 { font-size: 16px; margin-bottom: 16px; color: #2d3748; }
    .modal .form-group input { width: 100%; }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .field-error { color: #e53e3e; font-size: 11px; display: none; }
    .field-error.visible { display: block; }
  </style>
</head>
<body>

<div class="top-bar">
  <div style="display:flex;align-items:center">
    <span class="title">社内Webシステム</span>
    <span class="subtitle">ユーザー管理</span>
  </div>
  <a href="index.html">← ログイン画面へ</a>
</div>

<div class="content">

  <!-- ユーザー追加 -->
  <div class="card">
    <div class="card-header"><h2>ユーザー追加</h2></div>
    <div class="card-body">
      <div id="add-alert-success" class="alert alert-success"></div>
      <div id="add-alert-error"   class="alert alert-error"></div>
      <div class="form-row">
        <div class="form-group">
          <label>ユーザーID <span style="color:#e53e3e">必須</span></label>
          <input type="text" id="add-userid" placeholder="例: user002" maxlength="20">
          <span id="err-add-userid" class="field-error"></span>
        </div>
        <div class="form-group">
          <label>パスワード <span style="color:#e53e3e">必須</span></label>
          <input type="password" id="add-password" placeholder="8〜32文字" maxlength="32">
          <span id="err-add-password" class="field-error"></span>
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn btn-primary" onclick="addUser()">追加</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ユーザー一覧 -->
  <div class="card">
    <div class="card-header">
      <h2>ユーザー一覧</h2>
      <button class="btn btn-gray btn-sm" onclick="loadUsers()">更新</button>
    </div>
    <div class="card-body" style="padding:0">
      <div id="list-alert-error" class="alert alert-error" style="margin:16px"></div>
      <table id="user-table">
        <thead>
          <tr>
            <th>ユーザーID</th>
            <th>状態</th>
            <th>PW最終変更</th>
            <th>PW期限</th>
            <th>失敗回数</th>
            <th>ロック解除日時</th>
            <th>登録日</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="user-tbody">
          <tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- パスワードリセットモーダル -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal">
    <h3>パスワードリセット</h3>
    <p style="font-size:13px;color:#4a5568;margin-bottom:16px">
      対象ユーザー: <strong id="pw-modal-userid"></strong>
    </p>
    <div class="form-group" style="margin-bottom:4px">
      <label>新しいパスワード</label>
      <input type="password" id="pw-modal-input" placeholder="8〜32文字" maxlength="32" style="width:100%">
    </div>
    <span id="err-pw-modal" class="field-error"></span>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closePwModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitResetPassword()">変更する</button>
    </div>
  </div>
</div>

<script>
  const RE_USERID   = /^[a-zA-Z0-9]{1,20}$/;
  const RE_PASSWORD = /^[a-zA-Z0-9!"#$%&'()*+,\-./:;<=>?@[\\\]^_`{|}~]{8,32}$/;

  // ---- ユーザー一覧 ----
  async function loadUsers() {
    const tbody = document.getElementById('user-tbody');
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px">読み込み中...</td></tr>';
    try {
      const res = await fetch('/api/users');
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.error?.message);

      const users = json.data;
      if (users.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#aaa;padding:24px">ユーザーが登録されていません</td></tr>';
        return;
      }

      tbody.innerHTML = users.map(u => {
        const locked = u.locked_until && new Date(u.locked_until) > new Date();
        const pwExpired = (Date.now() - new Date(u.password_changed_at).getTime()) / (1000 * 60 * 60 * 24) >= 90;

        let badge;
        if (!u.is_active)  badge = '<span class="badge badge-inactive">無効</span>';
        else if (locked)   badge = '<span class="badge badge-locked">ロック中</span>';
        else               badge = '<span class="badge badge-active">有効</span>';

        const pwBadge = pwExpired ? '<span class="badge badge-expired">期限切れ</span>' : '';
        const lockInfo = u.locked_until ? `<span style="font-size:11px;color:#c53030">${fmtDate(u.locked_until)}</span>` : '<span style="color:#aaa">—</span>';

        return `<tr>
          <td><strong>${u.user_id}</strong></td>
          <td>${badge}</td>
          <td style="font-size:12px">${fmtDate(u.password_changed_at)}</td>
          <td>${pwBadge || '<span style="color:#aaa;font-size:11px">有効</span>'}</td>
          <td style="text-align:center">${u.failed_login_count}</td>
          <td>${lockInfo}</td>
          <td style="font-size:12px">${fmtDate(u.created_at)}</td>
          <td>
            <div style="display:flex;gap:4px;flex-wrap:wrap">
              <button class="btn btn-primary btn-sm" onclick="openPwModal('${u.user_id}')">PW変更</button>
              ${locked || u.failed_login_count > 0
                ? `<button class="btn btn-warning btn-sm" onclick="resetLock('${u.user_id}')">ロック解除</button>`
                : ''}
              <button class="btn btn-gray btn-sm" onclick="toggleActive('${u.user_id}', ${!u.is_active})">${u.is_active ? '無効化' : '有効化'}</button>
              <button class="btn btn-danger btn-sm" onclick="deleteUser('${u.user_id}')">削除</button>
            </div>
          </td>
        </tr>`;
      }).join('');

    } catch (err) {
      showAlert('list-alert-error', 'ユーザー一覧の取得に失敗しました: ' + err.message);
    }
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleDateString('ja-JP') + ' ' + d.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
  }

  // ---- ユーザー追加 ----
  async function addUser() {
    const userId   = document.getElementById('add-userid').value.trim();
    const password = document.getElementById('add-password').value;

    let valid = true;
    if (!RE_USERID.test(userId)) {
      showFieldError('err-add-userid', 'ユーザーIDは半角英数字1〜20文字で入力してください');
      valid = false;
    } else { clearFieldError('err-add-userid'); }

    if (!RE_PASSWORD.test(password)) {
      showFieldError('err-add-password', 'パスワードは半角英数記号8〜32文字で入力してください');
      valid = false;
    } else { clearFieldError('err-add-password'); }
    if (!valid) return;

    try {
      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, password }),
      });
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.error?.message);

      showAlert('add-alert-success', `✅ ユーザー「${userId}」を追加しました`);
      document.getElementById('add-userid').value = '';
      document.getElementById('add-password').value = '';
      loadUsers();
    } catch (err) {
      showAlert('add-alert-error', '❌ ' + err.message);
    }
  }

  // ---- ロック解除 ----
  async function resetLock(userId) {
    try {
      const res = await fetch(`/api/users/${userId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ resetLock: true }),
      });
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.error?.message);
      loadUsers();
    } catch (err) {
      alert('エラー: ' + err.message);
    }
  }

  // ---- 有効/無効切替 ----
  async function toggleActive(userId, newIsActive) {
    const label = newIsActive ? '有効化' : '無効化';
    if (!confirm(`ユーザー「${userId}」を${label}しますか？`)) return;
    try {
      const res = await fetch(`/api/users/${userId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ isActive: newIsActive }),
      });
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.error?.message);
      loadUsers();
    } catch (err) {
      alert('エラー: ' + err.message);
    }
  }

  // ---- 削除 ----
  async function deleteUser(userId) {
    if (!confirm(`ユーザー「${userId}」を削除してもよいですか？\nこの操作は元に戻せません。`)) return;
    try {
      const res = await fetch(`/api/users/${userId}`, { method: 'DELETE' });
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.error?.message);
      loadUsers();
    } catch (err) {
      alert('エラー: ' + err.message);
    }
  }

  // ---- パスワードリセットモーダル ----
  let pwModalUserId = null;
  function openPwModal(userId) {
    pwModalUserId = userId;
    document.getElementById('pw-modal-userid').textContent = userId;
    document.getElementById('pw-modal-input').value = '';
    clearFieldError('err-pw-modal');
    document.getElementById('pw-modal').classList.add('visible');
  }
  function closePwModal() {
    document.getElementById('pw-modal').classList.remove('visible');
    pwModalUserId = null;
  }
  async function submitResetPassword() {
    const password = document.getElementById('pw-modal-input').value;
    if (!RE_PASSWORD.test(password)) {
      showFieldError('err-pw-modal', 'パスワードは半角英数記号8〜32文字で入力してください');
      return;
    }
    clearFieldError('err-pw-modal');
    try {
      const res = await fetch(`/api/users/${pwModalUserId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password }),
      });
      const json = await res.json();
      if (json.status !== 'success') throw new Error(json.error?.message);
      closePwModal();
      loadUsers();
    } catch (err) {
      showFieldError('err-pw-modal', 'エラー: ' + err.message);
    }
  }

  // ---- ユーティリティ ----
  function showAlert(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 4000);
  }
  function showFieldError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add('visible');
  }
  function clearFieldError(id) {
    const el = document.getElementById(id);
    el.textContent = ''; el.classList.remove('visible');
  }

  // 初期ロード
  loadUsers();
</script>
</body>
</html>
