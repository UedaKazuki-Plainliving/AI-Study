<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社内Webシステム</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Meiryo', 'Yu Gothic', 'Hiragino Kaku Gothic Pro', sans-serif;
      background: #eef2f7; min-height: 100vh; color: #333;
    }
    .screen { display: none; }
    .screen.active { display: flex; }

    /* ---- ログイン ---- */
    #screen-login {
      justify-content: center; align-items: center;
      flex-direction: column; min-height: 100vh; padding: 20px;
    }
    .login-card {
      background: #fff; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 48px 40px 40px; width: 100%; max-width: 420px;
    }
    .login-header { text-align: center; margin-bottom: 32px; }
    .login-header .system-name { font-size: 13px; color: #666; margin-bottom: 6px; }
    .login-header h1 { font-size: 22px; font-weight: bold; color: #1a3a5c; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 13px; font-weight: bold; color: #444; margin-bottom: 6px; }
    .form-group label .required { color: #e53e3e; margin-left: 4px; font-size: 11px; }
    .form-group input {
      width: 100%; padding: 10px 12px; border: 1px solid #ccc;
      border-radius: 4px; font-size: 14px; font-family: monospace; transition: border-color 0.2s;
    }
    .form-group input:focus { outline: none; border-color: #3182ce; box-shadow: 0 0 0 3px rgba(49,130,206,0.15); }
    .form-group input.error { border-color: #e53e3e; background: #fff5f5; }
    .hint { font-size: 11px; color: #888; margin-top: 3px; }
    .field-error { color: #e53e3e; font-size: 12px; margin-top: 4px; display: none; }
    .field-error.visible { display: block; }

    .btn-login {
      width: 100%; padding: 12px; background: #1a3a5c; color: #fff;
      border: none; border-radius: 4px; font-size: 15px; font-weight: bold;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .btn-login:hover { background: #2a5298; }
    .btn-login:disabled { background: #a0aec0; cursor: not-allowed; }

    .auth-error {
      background: #fff5f5; border: 1px solid #feb2b2;
      border-radius: 4px; padding: 12px 14px; color: #c53030;
      font-size: 13px; margin-bottom: 16px; display: none;
    }
    .auth-error.visible { display: block; }
    .auth-locked { background: #fffbeb; border-color: #f6ad55; color: #744210; }

    .admin-link { margin-top: 12px; text-align: center; font-size: 12px; color: #888; }
    .admin-link a { color: #3182ce; text-decoration: none; }
    .admin-link a:hover { text-decoration: underline; }

    /* ---- ホーム ---- */
    #screen-home { flex-direction: column; min-height: 100vh; }
    .top-bar {
      background: #1a3a5c; color: #fff; padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .top-bar .title { font-size: 16px; font-weight: bold; }
    .top-bar .user-info { font-size: 13px; display: flex; align-items: center; gap: 16px; }
    .btn-logout {
      background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
      color: #fff; padding: 5px 14px; border-radius: 4px;
      font-size: 12px; cursor: pointer; transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }
    .home-content { padding: 40px; max-width: 900px; margin: 0 auto; width: 100%; }
    .home-content h2 { font-size: 20px; color: #1a3a5c; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 2px solid #e2e8f0; }
    .login-success-msg { background: #f0fff4; border: 1px solid #9ae6b4; border-radius: 6px; padding: 12px 16px; color: #276749; font-size: 13px; margin-bottom: 24px; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .dashboard-card { background: #fff; border-radius: 8px; padding: 24px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); text-align: center; color: #555; }
    .dashboard-card .icon { font-size: 32px; margin-bottom: 8px; }
    .dashboard-card .label { font-size: 13px; }

    /* ---- PW変更 ---- */
    #screen-pw-change {
      justify-content: center; align-items: center;
      flex-direction: column; min-height: 100vh; padding: 20px; background: #eef2f7;
    }
    .pw-change-card {
      background: #fff; border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      padding: 48px 40px 40px; width: 100%; max-width: 440px;
    }
    .pw-change-card h2 { font-size: 20px; color: #1a3a5c; margin-bottom: 8px; }
    .pw-expired-notice {
      background: #fffbeb; border: 1px solid #f6ad55; border-radius: 4px;
      padding: 10px 14px; color: #744210; font-size: 13px; margin-bottom: 24px;
    }
    .btn-change {
      width: 100%; padding: 12px; background: #2f855a; color: #fff;
      border: none; border-radius: 4px; font-size: 15px; font-weight: bold;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    .btn-change:hover { background: #276749; }
    .btn-change:disabled { background: #a0aec0; cursor: not-allowed; }
    .pw-change-success {
      background: #f0fff4; border: 1px solid #9ae6b4; border-radius: 4px;
      padding: 12px 14px; color: #276749; font-size: 13px; margin-bottom: 16px; display: none;
    }
    .pw-change-success.visible { display: block; }
  </style>
</head>
<body>

<!-- ========== ログイン画面 ========== -->
<div id="screen-login" class="screen active">
  <div class="login-card">
    <div class="login-header">
      <div class="system-name">PLAIN LIVING Co., Ltd.</div>
      <h1>社内Webシステム</h1>
    </div>

    <div id="auth-error" class="auth-error" role="alert"></div>

    <div class="form-group">
      <label for="user-id">ユーザーID <span class="required">必須</span></label>
      <input type="text" id="user-id" autocomplete="username" maxlength="20" placeholder="例: user001">
      <div class="hint">半角英数字　1〜20文字</div>
      <div id="err-userid" class="field-error" role="alert"></div>
    </div>

    <div class="form-group">
      <label for="password">パスワード <span class="required">必須</span></label>
      <input type="password" id="password" autocomplete="current-password" maxlength="32">
      <div class="hint">半角英数記号　8〜32文字</div>
      <div id="err-password" class="field-error" role="alert"></div>
    </div>

    <button class="btn-login" id="btn-login" type="button">ログイン</button>
  </div>
</div>

<!-- ========== ホーム画面 ========== -->
<div id="screen-home" class="screen">
  <div class="top-bar">
    <div class="title">社内Webシステム</div>
    <div class="user-info">
      <span id="home-username"></span>
      <button class="btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </div>
  <div class="home-content">
    <div class="login-success-msg" id="login-success-msg"></div>
    <h2>ホーム</h2>
    <div class="dashboard-grid">
      <div class="dashboard-card"><div class="icon">📋</div><div class="label">申請管理</div></div>
      <div class="dashboard-card"><div class="icon">📅</div><div class="label">スケジュール</div></div>
      <div class="dashboard-card"><div class="icon">📊</div><div class="label">レポート</div></div>
      <div class="dashboard-card"><div class="icon">👥</div><div class="label">組織情報</div></div>
      <div class="dashboard-card"><div class="icon">⚙️</div><div class="label">設定</div></div>
      <div class="dashboard-card"><div class="icon">❓</div><div class="label">ヘルプ</div></div>
    </div>
  </div>
</div>

<!-- ========== パスワード変更画面 ========== -->
<div id="screen-pw-change" class="screen">
  <div class="pw-change-card">
    <h2>パスワードの変更</h2>
    <div class="pw-expired-notice">
      ⚠️ パスワードの有効期限（90日）が切れています。新しいパスワードを設定してください。
    </div>
    <div id="pw-change-success" class="pw-change-success">
      ✅ パスワードを変更しました。ログイン画面に戻ります。
    </div>
    <div class="form-group">
      <label for="new-password">新しいパスワード <span class="required">必須</span></label>
      <input type="password" id="new-password" maxlength="32">
      <div class="hint">半角英数記号　8〜32文字</div>
      <div id="err-new-password" class="field-error" role="alert"></div>
    </div>
    <div class="form-group">
      <label for="confirm-password">新しいパスワード（確認） <span class="required">必須</span></label>
      <input type="password" id="confirm-password" maxlength="32">
      <div id="err-confirm-password" class="field-error" role="alert"></div>
    </div>
    <button class="btn-change" id="btn-change" type="button">パスワードを変更する</button>
  </div>
</div>

<script>
  const RE_USERID   = /^[a-zA-Z0-9]{1,20}$/;
  const RE_PASSWORD = /^[a-zA-Z0-9!"#$%&'()*+,\-./:;<=>?@[\\\]^_`{|}~]{8,32}$/;

  // ---- 画面切替 ----
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // ---- バリデーション ----
  function validateUserId(v) {
    if (!v)              return 'ユーザーIDを入力してください';
    if (!RE_USERID.test(v)) return 'ユーザーIDは半角英数字で入力してください';
    return null;
  }
  function validatePassword(v) {
    if (!v)                return 'パスワードを入力してください';
    if (!RE_PASSWORD.test(v)) return 'パスワードは半角英数記号で入力してください';
    return null;
  }
  function showFieldError(errId, inputEl, msg) {
    const el = document.getElementById(errId);
    if (msg) { el.textContent = msg; el.classList.add('visible'); inputEl.classList.add('error'); }
    else     { el.textContent = ''; el.classList.remove('visible'); inputEl.classList.remove('error'); }
  }
  function showAuthError(msg, isLock = false) {
    const el = document.getElementById('auth-error');
    el.textContent = msg; el.classList.add('visible');
    isLock ? el.classList.add('auth-locked') : el.classList.remove('auth-locked');
  }
  function hideAuthError() {
    const el = document.getElementById('auth-error');
    el.classList.remove('visible', 'auth-locked');
  }

  // ---- ログイン ----
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('user-id').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('user-id').addEventListener('blur', () => {
    showFieldError('err-userid', document.getElementById('user-id'), validateUserId(document.getElementById('user-id').value.trim()));
  });
  document.getElementById('password').addEventListener('blur', () => {
    showFieldError('err-password', document.getElementById('password'), validatePassword(document.getElementById('password').value));
  });
  document.getElementById('user-id').addEventListener('input', hideAuthError);
  document.getElementById('password').addEventListener('input', hideAuthError);

  async function doLogin() {
    const userIdEl   = document.getElementById('user-id');
    const passwordEl = document.getElementById('password');
    const userId   = userIdEl.value.trim();
    const password = passwordEl.value;

    const userIdErr   = validateUserId(userId);
    const passwordErr = validatePassword(password);
    showFieldError('err-userid',   userIdEl,   userIdErr);
    showFieldError('err-password', passwordEl, passwordErr);
    if (userIdErr || passwordErr) return;

    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = '認証中...';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, password }),
      });
      const json = await res.json();

      if (res.ok) {
        document.getElementById('home-username').textContent = json.data.userId + ' さん';
        document.getElementById('login-success-msg').textContent = `ログインしました（${new Date().toLocaleString('ja-JP')}）`;
        showScreen('screen-home');
        return;
      }

      const code = json.error?.code;
      if (res.status === 422 && code === 'PASSWORD_EXPIRED') {
        showScreen('screen-pw-change');
        return;
      }
      if (code === 'ACCOUNT_LOCKED') {
        const until = json.error.lockedUntil ? `（${new Date(json.error.lockedUntil).toLocaleString('ja-JP')} まで）` : '';
        showAuthError(json.error.message + until, true);
        return;
      }
      // 認証失敗
      const remain = json.error?.remainingAttempts;
      const suffix = remain != null ? `（あと${remain}回失敗するとロックされます）` : '';
      showAuthError((json.error?.message || '認証に失敗しました') + suffix);

    } catch {
      showAuthError('サーバーに接続できません。しばらく待ってから再試行してください。');
    } finally {
      btn.disabled = false; btn.textContent = 'ログイン';
    }
  }

  // ---- ログアウト ----
  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' }).catch(() => {});
    document.getElementById('user-id').value = '';
    document.getElementById('password').value = '';
    hideAuthError();
    showFieldError('err-userid',   document.getElementById('user-id'),   null);
    showFieldError('err-password', document.getElementById('password'),  null);
    showScreen('screen-login');
  }

  // ---- パスワード変更 ----
  document.getElementById('btn-change').addEventListener('click', doChangePassword);

  async function doChangePassword() {
    const newPwEl   = document.getElementById('new-password');
    const confirmEl = document.getElementById('confirm-password');
    const newPw     = newPwEl.value;
    const confirmPw = confirmEl.value;

    const newPwErr = validatePassword(newPw);
    showFieldError('err-new-password', newPwEl, newPwErr);

    let confirmErr = null;
    if (!confirmPw)          confirmErr = '確認用パスワードを入力してください';
    else if (newPw !== confirmPw) confirmErr = 'パスワードが一致しません';
    showFieldError('err-confirm-password', confirmEl, confirmErr);
    if (newPwErr || confirmErr) return;

    const btn = document.getElementById('btn-change');
    btn.disabled = true; btn.textContent = '変更中...';

    try {
      const res = await fetch('/api/auth/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ newPassword: newPw }),
      });
      const json = await res.json();
      if (!res.ok) {
        showFieldError('err-new-password', newPwEl, json.error?.message || 'エラーが発生しました');
        return;
      }
      document.getElementById('pw-change-success').classList.add('visible');
      setTimeout(() => {
        document.getElementById('pw-change-success').classList.remove('visible');
        newPwEl.value = ''; confirmEl.value = '';
        showScreen('screen-login');
      }, 2000);
    } catch {
      showFieldError('err-new-password', newPwEl, 'サーバーに接続できません');
    } finally {
      btn.disabled = false; btn.textContent = 'パスワードを変更する';
    }
  }
</script>
</body>
</html>
